<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin — MyYatraExchange</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 1000px; margin: 0 auto; }
    input, button { padding: 6px; margin: 4px 0; }
    .order { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
    .order img { max-width: 200px; display: block; margin: 5px 0; }
    .status { font-weight: bold; }
    .approve { background-color: #4CAF50; color: white; }
    .reject { background-color: #f44336; color: white; }
  </style>
</head>
<body>
  <h1>Admin Panel — MyYatraExchange</h1>

  <label>Admin Token: <input type="password" id="token" placeholder="Enter admin token"></label>
  <button id="load">Load Orders</button>

  <div id="ordersList"></div>

  <script>
    const apiBase = '/api/payment';

    document.getElementById('load').addEventListener('click', async () => {
      const token = document.getElementById('token').value.trim();
      if (!token) return alert('Please enter admin token');

      const res = await fetch(`${apiBase}/orders`, { 
        headers: { 'x-admin-token': token } 
      });
      const orders = await res.json();
      if (orders.error) return alert(orders.error);

      const container = document.getElementById('ordersList');
      container.innerHTML = '';

      orders.forEach(order => {
        const div = document.createElement('div');
        div.className = 'order';
        div.innerHTML = `
          <div><strong>Order ID:</strong> ${order.orderId}</div>
          <div><strong>Buyer:</strong> ${order.buyerName || '-'}</div>
          <div><strong>Amount:</strong> ₹${order.amount}</div>
          <div><strong>Status:</strong> <span class="status">${order.status}</span></div>
          <div>
            <strong>UTR:</strong> ${order.utr || '-'} <br>
            <strong>Sender VPA:</strong> ${order.senderVpa || '-'}
          </div>
          ${order.screenshotUrl ? `<div><strong>Screenshot:</strong><br><img src="${order.screenshotUrl}" /></div>` : ''}
          <div>
            <button class="approve" data-id="${order.orderId}">Approve</button>
            <button class="reject" data-id="${order.orderId}">Reject</button>
          </div>
        `;
        container.appendChild(div);
      });

      // Attach event listeners to buttons
      document.querySelectorAll('.approve').forEach(btn => {
        btn.addEventListener('click', () => updateStatus(btn.dataset.id, 'approve', token));
      });
      document.querySelectorAll('.reject').forEach(btn => {
        btn.addEventListener('click', () => updateStatus(btn.dataset.id, 'reject', token));
      });
    });

    async function updateStatus(orderId, action, token) {
      const res = await fetch(`${apiBase}/verify`, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'x-admin-token': token
        },
        body: JSON.stringify({ orderId, action })
      });
      const data = await res.json();
      if (data.error) return alert(data.error);
      alert(`Order ${orderId} ${action === 'approve' ? 'approved' : 'rejected'} successfully!`);
      document.getElementById('load').click(); // refresh list
    }
  </script>
</body>
</html>
