<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pay — MyYatraExchange</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <h1>Pay for Your Ticket</h1>

  <div id="orderContainer">
    <p>Loading order details...</p>
  </div>

  <script>
    const apiBase = '/api/payment';

    // Helper to get query params
    function qs(key) {
      return new URLSearchParams(location.search).get(key);
    }

    async function loadOrder() {
      const orderId = qs('orderId');
      if (!orderId) {
        document.getElementById('orderContainer').innerText = 'Order ID missing in URL';
        return;
      }

      // Fetch order details
      const res = await fetch(`${apiBase}/orders`);
      const orders = await res.json();
      const order = orders.find(o => o.orderId === orderId);
      if (!order) {
        document.getElementById('orderContainer').innerText = 'Order not found';
        return;
      }

      // Build HTML
      const html = [];

      html.push(`<p><strong>Order ID:</strong> ${order.orderId}</p>`);
      html.push(`<p><strong>Buyer:</strong> ${order.buyerName || '-'}</p>`);
      html.push(`<p><strong>Amount:</strong> ₹${Number(order.amount).toFixed(2)}</p>`);

      // UPI QR
      const tn = encodeURIComponent(order.orderId);
      const upiLink = `upi://pay?pa=${encodeURIComponent("{{UPI_VPA}}")}&pn=${encodeURIComponent("MyYatraExchange")}&am=${Number(order.amount).toFixed(2)}&cu=INR&tn=${tn}`;
      const qrUrl = `https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl=${encodeURIComponent(upiLink)}`;
      html.push(`<p><strong>Scan QR or click link to pay:</strong></p>`);
      html.push(`<img src="${qrUrl}" alt="UPI QR Code">`);
      html.push(`<p><a href="${upiLink}">Open UPI app to pay</a></p>`);

      // Payment proof form
      html.push(`
        <hr>
        <h3>Submit Payment Proof</h3>
        <form id="paymentForm" enctype="multipart/form-data">
          <input type="hidden" name="orderId" value="${order.orderId}">
          <label>UTR / Transaction ID<br><input name="utr" required></label><br>
          <label>Sender VPA (optional)<br><input name="senderVpa"></label><br>
          <label>Amount paid (INR)<br><input name="amount" type="number" step="0.01" value="${Number(order.amount).toFixed(2)}" required></label><br>
          <label>Screenshot (optional)<br><input type="file" name="screenshot" accept="image/*"></label><br>
          <button type="submit">Submit Proof</button>
        </form>
        <div id="msg"></div>
      `);

      document.getElementById('orderContainer').innerHTML = html.join('');

      // Form submit
      const form = document.getElementById('paymentForm');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(form);
        const res = await fetch(`${apiBase}/submit-proof`, { method: 'POST', body: fd });
        const data = await res.json();
        if (data.error) {
          document.getElementById('msg').innerText = 'Error: ' + data.error;
        } else {
          document.getElementById('msg').innerText = 'Payment proof submitted. Status: PAYMENT_PROOF_SUBMITTED. Wait for admin verification.';
        }
      });
    }

    loadOrder();
  </script>
</body>
</html>
