<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Required Meta Tags -->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />

    <!-- SEO Meta -->
    <title>My Yatra Exchange – Find & Post Travel Tickets Easily</title>
    <meta
      name="description"
      content="MyYatraExchange is India’s trusted platform to post, find, and exchange travel tickets easily. 100% user managed. Fast, safe, and simple."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Open Graph (Social Share SEO) -->
    <meta property="og:title" content="My Yatra Exchange" />
    <meta
      property="og:description"
      content="Sell or find travel tickets in minutes. Easy & fast!"
    />
    <meta property="og:image" content="/logo192.png" />
    <meta property="og:url" content="https://www.myyatraexchange.com/" />
    <meta property="og:type" content="website" />

    <!-- Preconnect (Speed Optimization) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts (Fast Loading) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Main CSS (handled by React build) -->
  </head>

  <body>
    <div id="root"></div>

    <!-- Main React Script (build system generates file automatically) -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
