<!-- save as src/assets/logo.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300" role="img" aria-label="MyYatraExchange logo">
  <title>MyYatraExchange</title>
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ff8a00"/>
      <stop offset="1" stop-color="#ff5a00"/>
    </linearGradient>

    <linearGradient id="g2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#19a974"/>
      <stop offset="1" stop-color="#0aa050"/>
    </linearGradient>

    <!-- arrow path to reuse -->
    <path id="arrow" d="M260 60 C300 20, 380 20, 420 60" fill="none" stroke="url(#g1)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </defs>

  <!-- circular arrows background -->
  <g transform="translate(120,150)">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#f2f2f2" stroke-width="0" />
    <g id="arrows">
      <path d="M-58,-30 A90,90 0 0,1 58,-30" fill="none" stroke="url(#g1)" stroke-width="10" stroke-linecap="round" />
      <polygon points="66,-30 54,-40 58,-30 54,-20" fill="url(#g1)" transform="rotate(20 60 -30)"/>
      <path d="M58,30 A90,90 0 0,1 -58,30" fill="none" stroke="url(#g2)" stroke-width="10" stroke-linecap="round" />
      <polygon points="-66,30 -54,20 -60,30 -54,40" fill="url(#g2)" transform="rotate(-20 -60 30)"/>
    </g>
  </g>

  <!-- train icon (simple, stylized) -->
  <g transform="translate(80,120) scale(1.0)">
    <rect x="80" y="50" width="120" height="70" rx="12" ry="12" fill="#ffffff" />
    <rect x="92" y="64" width="96" height="40" rx="6" ry="6" fill="#0b5fa8"/>
    <rect x="92" y="64" width="28" height="40" rx="4" ry="4" fill="#ffffff" opacity="0.12"/>
    <circle cx="110" cy="124" r="6" fill="#333"/>
    <circle cx="190" cy="124" r="6" fill="#333"/>
    <rect x="82" y="36" width="8" height="8" rx="2" fill="#333"/>
    <rect x="190" y="36" width="8" height="8" rx="2" fill="#333"/>
    <rect x="110" y="38" width="40" height="6" rx="3" fill="#fff" opacity="0.15"/>
  </g>

  <!-- Text -->
  <g transform="translate(260,140)">
    <text x="0" y="-10" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="42" fill="#ff8a00">my</text>
    <text x="58" y="-10" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="42" fill="#0b5fa8">yatra</text>
    <text x="0" y="38" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="48" fill="#19a974">exchange</text>
    <text x="240" y="48" font-family="Inter, Arial, sans-serif" font-size="20" fill="#0b5fa8">.com</text>
  </g>
</svg>

